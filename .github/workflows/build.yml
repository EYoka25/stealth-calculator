name: Cloud Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Gradle Engine on Cloud
      uses: gradle/actions/setup-gradle@v4

    - name: Run Build Without Wrapper
      run: |
        cd app-repo
        gradle assembleDebug --stacktrace
        
    - name: Upload Finished APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: StealthCalculator-Test-Build
        path: app-repo/app/build/outputs/apk/debug/app-debug.apk
