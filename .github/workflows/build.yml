name: Cloud Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Check Folder Contents
      run: |
        echo "=== Root Contents ==="
        ls -la
        echo "=== app-repo Contents ==="
        ls -la app-repo || echo "app-repo folder not found"

    - name: Run Build
      run: |
        cd app-repo
        if [ ! -f gradlew ]; then
          echo "gradlew wrapper missing, attempting to build anyway..."
        else
          chmod +x gradlew
        fi
        ./gradlew assembleDebug --stacktrace
        
    - name: Upload Finished APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: StealthCalculator-Test-Build
        path: app-repo/app/build/outputs/apk/debug/app-debug.apk
