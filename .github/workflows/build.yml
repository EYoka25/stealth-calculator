name: Cloud Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Fix and Run Gradle Build
      run: |
        cd app-repo
        # Check if gradlew exists, if not, generate a fresh one
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        chmod +x gradlew
        ./gradlew assembleDebug
        
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: StealthCalculator-Test-Build
        path: app-repo/app/build/outputs/apk/debug/app-debug.apk
