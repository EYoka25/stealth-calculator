version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: opencalc_postgres
    environment:
      POSTGRES_DB: opencalc_chat
      POSTGRES_USER: opencalc
      POSTGRES_PASSWORD: opencalc_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencalc -d opencalc_chat"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opencalc_redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: opencalc_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: opencalc
      MINIO_ROOT_PASSWORD: opencalc_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: opencalc_backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/opencalc_chat
      DATABASE_USER: opencalc
      DATABASE_PASSWORD: opencalc_secret
      REDIS_URL: redis://redis:6379
      MINIO_URL: http://minio:9000
      MINIO_ROOT_USER: opencalc
      MINIO_ROOT_PASSWORD: opencalc_secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
